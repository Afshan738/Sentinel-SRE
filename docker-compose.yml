version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: AfshanQ
      POSTGRES_PASSWORD: Afshan525
      POSTGRES_DB: sre_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sentinel-rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 

  redis:
    image: redis:alpine
    container_name: sentinel-redis
    ports:
      - "16379:6379"

volumes:
  postgres_data: 